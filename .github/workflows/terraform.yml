name: Terraform Plan & Apply for dev

on:
  push:
    branches:
      - main
  workflow_dispatch:
    secrets:
      ESXI_PASSWORD:
        description: 'Password for ESXi host'
        required: true
        type: secret

jobs:
  terraform:
    environment: ca
    runs-on: ubuntu-latest
    env:
      # TF_VAR_esxi_user: ${{ secrets.ESXI_USER }}
      TF_VAR_esxi_password: ${{ secrets.ESXI_PASSWORD }}
      TF_VAR_esxi_host: ${{ secrets.ESXI_HOST }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Test ping
        run: |
          echo "Testing connectivity to ESXi host"
          ESXI_HOST=${{ secrets.ESXI_HOST }}
          echo $ESXI_HOST
          ping -c 4 ${{ secrets.ESXI_HOST }}

      - name: Terraform Init
        working-directory: ./env/dev
        run: |
          pwd
          ls -lrt
          terraform init

      - name: Terraform Format
        working-directory: ./env/dev
        run: terraform fmt -check

      - name: Terraform Validate
        working-directory: ./env/dev
        run: terraform validate

      - name: Terraform Plan
        working-directory: ./env/dev
        run: terraform plan -out=tfplan

      - name: Terraform Apply (manual approval)
        working-directory: ./env/dev
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan
